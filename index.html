<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compre seu ingresso para festa Goodtimes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-cubes { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-12">

    <script>
        // ATENÇÃO: COLOQUE A URL DA NOVA IMPLANTAÇÃO AQUI
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbxjvuqdKk-OYXundFM1l9t7AYPjznzOQujQX5Ai0R3ulOB8I6DxQVxp9NKfTLm16emI/exec"; 
        const TOTAL_TICKETS = 50; 
        const PIX_KEY = "pix@manoelgoncalves.com.br";
    </script>

    <!-- Cabeçalho -->
    <div class="relative h-64 md:h-80 bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-cubes"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-2 italic drop-shadow-2xl">
                GOODTIMES <span class="text-pink-400">PARTY</span>
            </h1>
            <p class="text-lg md:text-xl font-medium text-purple-200 uppercase tracking-widest">As melhores musica dos anos 80!</p>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-4 -mt-16 relative z-20">
        <!-- Contador -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="md:col-span-2 bg-slate-900 rounded-3xl p-6 shadow-2xl border border-slate-800 backdrop-blur-xl bg-opacity-95">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-indigo-500/20 p-3 rounded-2xl text-indigo-400"><i data-lucide="ticket" class="w-6 h-6"></i></div>
                        <div>
                            <h2 class="font-bold text-lg">Ingressos</h2>
                            <p class="text-slate-400 text-xs uppercase tracking-wider">Online</p>
                        </div>
                    </div>
                    <div class="text-right"><span id="remaining-count" class="text-4xl font-black text-indigo-400">--</span></div>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-1000" style="width: 100%"></div>
                </div>
            </div>
            <div class="bg-gradient-to-br from-pink-600 to-purple-700 rounded-3xl p-6 shadow-xl text-center flex flex-col justify-center">
                <p class="text-[10px] uppercase font-black text-pink-200">Antecipado</p>
                <div class="text-3xl font-black leading-none">R$ 10</div>
            </div>
        </div>

        <!-- Form -->
        <div id="form-container" class="bg-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-800 backdrop-blur-xl bg-opacity-95">
            <form id="purchase-form" class="space-y-5">
                <div class="space-y-4">
                    <div>
                        <label class="text-sm font-bold text-slate-400 ml-1">Nome Completo</label>
                        <input required type="text" id="nome" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-4 text-white">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-bold text-slate-400 ml-1">WhatsApp</label>
                            <input required type="tel" id="whatsapp" placeholder="Ex: 5511999999999" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-4 text-white">
                        </div>
                        <div>
                            <label class="text-sm font-bold text-slate-400 ml-1">E-mail</label>
                            <input required type="email" id="email" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-4 text-white">
                        </div>
                    </div>
                </div>

                <div class="pt-6 mt-6 border-t border-slate-800">
                    <div class="bg-slate-950 border border-indigo-500/30 rounded-2xl p-5 mb-5 text-sm space-y-3">
                        <p class="text-emerald-400 font-bold">Pix: pix@manoelgoncalves.com.br</p>
                        <p class="text-slate-500 text-xs italic">Nome: Manoel Omar Barbosa Gonçalves</p>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-400 ml-1">Anexar Comprovante</label>
                        <p class="text-[10px] text-amber-400 font-medium mb-2 leading-tight">Envie o comprovante para habilitar o botão de compra.</p>
                        <label for="comprovante" class="flex flex-col items-center justify-center w-full h-32 bg-slate-950 border-2 border-dashed border-slate-800 rounded-2xl cursor-pointer">
                            <div id="upload-placeholder"><p class="text-sm text-slate-500">Selecionar Imagem</p></div>
                            <div id="file-info" class="hidden text-emerald-400 font-medium text-sm">✓ Arquivo Anexado</div>
                            <input id="comprovante" type="file" accept="image/*" class="hidden" required onchange="handleFile(this)" />
                        </label>
                    </div>
                </div>

                <button type="submit" id="submit-btn" disabled class="w-full py-5 rounded-2xl font-black text-lg mt-6 bg-gradient-to-r from-indigo-600 to-pink-600 opacity-50 cursor-not-allowed">
                    <span id="btn-text">Finalizar Compra</span>
                </button>
            </form>
        </div>

        <div id="success-container" class="hidden bg-slate-900 border border-emerald-500/30 rounded-3xl p-8 text-center">
            <h2 class="text-3xl font-bold text-emerald-400 mb-2">Sucesso!</h2>
            <p class="text-slate-300">Aguarde a confirmação por IA no seu WhatsApp.</p>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const submitBtn = document.getElementById('submit-btn');
        let base64File = "";

        async function updateStatus() {
            try {
                const res = await fetch(`${GOOGLE_SHEETS_URL}?action=status`);
                const data = await res.json();
                document.getElementById('remaining-count').innerText = data.remaining;
                document.getElementById('progress-bar').style.width = `${(data.remaining / TOTAL_TICKETS) * 100}%`;
            } catch(e) {}
        }

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('upload-placeholder').classList.add('hidden');
                document.getElementById('file-info').classList.remove('hidden');
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64File = e.target.result.split(',')[1];
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            document.getElementById('btn-text').innerText = "Enviando...";
            
            const payload = {
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                file: base64File,
                fileName: document.getElementById('comprovante').files[0].name
            };

            try {
                // Enviamos como POST simples para evitar erros de CORS no Google
                await fetch(GOOGLE_SHEETS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload),
                    mode: 'no-cors' 
                });
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
            } catch (err) { alert("Erro ao enviar."); submitBtn.disabled = false; }
        });

        updateStatus();
    </script>
</body>
</html>
